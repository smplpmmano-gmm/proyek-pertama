<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SMP LPM Mano</title>
  <link rel="icon" type="image/x-icon" href="https://smplpmmano-gmm.github.io/proyek-pertama/favicon.ico">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, html { height: 100%; background: #1B5E2A; overflow: hidden; }
    #loading {
      position: fixed; inset: 0;
      background: #1B5E2A;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: #fff; font-family: Arial, sans-serif;
      z-index: 999;
      transition: opacity 0.4s;
    }
    #loading.fade { opacity: 0; pointer-events: none; }
    #loading img {
      width: 80px; height: 80px;
      border-radius: 50%; background: #fff;
      padding: 6px; object-fit: contain;
      margin-bottom: 16px;
    }
    #loading h2 { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
    #loading p { font-size: 12px; opacity: 0.8; font-style: italic; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-top: 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    iframe { border: none; width: 100%; height: 100%; }
  </style>
</head>
<body>
  <div id="loading">
    <img src="https://lh3.googleusercontent.com/d/1pVeH-6CRAs2ypRRS917gknBpK0b1wh0v"
         alt="Logo" onerror="this.style.display='none'">
    <h2>SMP LPM Mano</h2>
    <p>"Cerdas, Mandiri, Berakhlak Mulia"</p>
    <div class="spinner"></div>
  </div>
  <iframe
    id="main-frame"
    src="https://script.google.com/macros/s/AKfycbxswix_Fiv02gR2150bRSU6HVAYWUNn_bc4qA54XSUptFcS5uj9a8HQHwAdQ5avdHth/exec"
    onload="document.getElementById('loading').classList.add('fade')"
    allowfullscreen>
  </iframe>
  <script>
    var loaded = false;
    document.getElementById('main-frame').addEventListener('load', function() {
      loaded = true;
    });
    setTimeout(function() {
      if (!loaded) {
        location.reload();
      }
    }, 5000);
  </script>
</body>
</html>
