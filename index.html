<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMP LPM Mano</title>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; margin: 20px; }
        header { background: #0056b3; color: white; padding: 20px; text-align: center; }
        .container { max-width: 600px; margin: 20px auto; padding: 20px; border: 1px solid #ccc; border-radius: 5px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input, .form-group textarea { width: 100%; padding: 8px; box-sizing: border-box; }
        button { background: #28a745; color: white; padding: 10px 15px; border: none; border-radius: 3px; cursor: pointer; }
        button:hover { background: #218838; }
    </style>
</head>
<body>

    <header>
        <h1>Selamat Datang di Website Resmi SMP LPM Mano</h1>
    </header>

    <main class="container">
        <h2>Hubungi Kami / Kirim Saran</h2>
        
        <form action="https://script.google.com/macros/s/AKfycbxswix_Fiv02gR2150bRSU6HVAYWUNn_bc4qA54XSUptFcS5uj9a8HQHwAdQ5avdHth/exec" method="POST">
            <div class="form-group">
                <label for="nama">Nama Pengirim:</label>
                <input type="text" id="nama" name="nama" required placeholder="Masukkan nama Anda">
            </div>
            
            <div class="form-group">
                <label for="pesan">Pesan / Saran:</label>
                <textarea id="pesan" name="pesan" rows="5" required placeholder="Tuliskan pesan atau saran untuk sekolah..."></textarea>
            </div>
            
            <button type="submit">Kirim Pesan</button>
        </form>
    </main>

</body>
</html>
